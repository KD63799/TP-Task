version: '3'

silent: false

# Charge automatiquement les variables depuis .env (jamais versionné)
dotenv: ['.env']

vars:
  APP_NAME: tp-task
  # Hash Git court — calculé une fois, réutilisé dans push et deploy:*
  GIT_SHA:
    sh: git rev-parse --short HEAD

tasks:
  default:
    desc: Affiche toutes les tâches disponibles
    cmds:
      - task --list
    silent: true

  # ──────────────────────────────────────────────
  # DÉPENDANCES
  # ──────────────────────────────────────────────
  install:
    desc: Installe les dépendances npm (ignoré si package-lock.json est à jour)
    cmds:
      - npm ci
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  # ──────────────────────────────────────────────
  # BUILD LOCAL
  # ──────────────────────────────────────────────
  build:
    desc: Construit l'image Docker locale via docker-compose.yml
    deps: [install]
    cmds:
      - docker compose build --no-cache

  # ──────────────────────────────────────────────
  # DÉVELOPPEMENT LOCAL (sans Docker)
  # ──────────────────────────────────────────────
  dev:
    desc: Lance le serveur de développement Angular avec hot reload
    deps: [install]
    cmds:
      - npm run start

  # ──────────────────────────────────────────────
  # STACK DOCKER COMPOSE (locale)
  # ──────────────────────────────────────────────
  deploy:
    desc: Lance la stack complète via Docker Compose en arrière-plan
    deps: [build]
    cmds:
      - docker compose up -d
      - echo "Stack démarrée → http://localhost:4200"

  logs:
    desc: "Affiche les logs en continu — filtrer par service : task logs SERVICE=app"
    vars:
      SERVICE: '{{.SERVICE | default ""}}'
    cmds:
      - docker compose logs -f {{.SERVICE}}

  restart:
    desc: Redémarre proprement la stack (arrêt complet puis redéploiement)
    cmds:
      - task: stop
      - task: deploy

  stop:
    desc: Arrête et supprime les conteneurs
    cmds:
      - docker compose down

  # ──────────────────────────────────────────────
  # REGISTRY — publication de l'image
  # ──────────────────────────────────────────────
  push:
    desc: "Construit l'image, la tag avec le hash Git ({{.GIT_SHA}}) et publie sur Docker Hub"
    cmds:
      - docker build
          -t $DOCKER_USER/tp-task:{{.GIT_SHA}}
          -t $DOCKER_USER/tp-task:latest
          .
      - docker push $DOCKER_USER/tp-task:{{.GIT_SHA}}
      - docker push $DOCKER_USER/tp-task:latest
      - echo "Publié → docker.io/$DOCKER_USER/tp-task:{{.GIT_SHA}}"

  # ──────────────────────────────────────────────
  # DÉPLOIEMENT DISTANT
  # ──────────────────────────────────────────────
  deploy:copy:
    desc: Copie docker-compose.prod.yml sur le serveur et écrit le fichier .env distant
    cmds:
      # Envoie le fichier Compose de production
      - scp -P $REMOTE_PORT docker-compose.prod.yml $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR/docker-compose.yml
      # Écrit un .env minimal sur le serveur avec le tag de l'image à déployer
      - >-
        ssh -p $REMOTE_PORT $REMOTE_USER@$REMOTE_HOST
        "printf 'DOCKER_USER=%s\nIMAGE_TAG=%s\n' '$DOCKER_USER' '{{.GIT_SHA}}' > $REMOTE_DIR/.env"

  deploy:start:
    desc: "Lance la stack sur le serveur via SSH (pull → up)"
    cmds:
      - >-
        ssh -p $REMOTE_PORT $REMOTE_USER@$REMOTE_HOST
        "cd $REMOTE_DIR &&
         docker compose pull &&
         docker compose up -d --remove-orphans"

  deploy:remote:
    desc: "Déploiement complet : push registry → copie Compose → démarrage distant"
    cmds:
      - task: push
      - task: deploy:copy
      - task: deploy:start

  # ──────────────────────────────────────────────
  # QUALITÉ (shift left)
  # ──────────────────────────────────────────────
  lint:
    desc: "Vérifie le formatage du code source — exit code non-nul si échec"
    deps: [install]
    cmds:
      - npm run lint

  format:
    desc: Corrige automatiquement le formatage (ne pas utiliser en CI)
    deps: [install]
    cmds:
      - npx prettier --write "src/**/*.{ts,html,css}"

  test:
    desc: Lance les tests unitaires et affiche le résultat (pass / fail / nombre)
    deps: [install]
    cmds:
      - npm run test

  ci:
    desc: "Pipeline local : lint → test → build — s'arrête à la première erreur"
    cmds:
      - task: lint
      - task: test
      - task: build

  # ──────────────────────────────────────────────
  # NETTOYAGE
  # ──────────────────────────────────────────────
  clean:
    desc: Supprime dist/, node_modules/ et les images Docker locales
    cmds:
      - docker compose down --volumes --rmi local
      - rm -rf dist/ node_modules/
