<main class="container">
  <header>
    <h1>Task Manager</h1>
    <p class="summary">{{ pendingCount() }} pending &middot; {{ doneCount() }} done</p>
  </header>

  <section class="add-task">
    <input
      type="text"
      [(ngModel)]="newTitle"
      (keyup.enter)="addTask()"
      placeholder="New task..."
      aria-label="New task title"
    />
    <button class="btn btn-primary" (click)="addTask()">Add</button>
  </section>

  <ul class="task-list" aria-label="Task list">
    @for (task of tasks(); track task.id) {
      <li class="task-item" [class.task-item--done]="task.done">
        <span class="task-title">{{ task.title }}</span>
        <div class="task-actions">
          <button class="btn btn-secondary" (click)="toggleTask(task.id)">
            {{ task.done ? 'Undo' : 'Done' }}
          </button>
          <button class="btn btn-danger" (click)="deleteTask(task.id)">Delete</button>
        </div>
      </li>
    } @empty {
      <li class="task-empty">No tasks yet. Add one above.</li>
    }
  </ul>
</main>
