stages:
  - lint
  - test
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ──────────────────────────────────────────────
# LINT — vérifie le formatage Prettier
# ──────────────────────────────────────────────
lint:
  stage: lint
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npx prettier --check "src/**/*.{ts,html,scss,css,json}"

# ──────────────────────────────────────────────
# TEST — exécute les tests unitaires
# ──────────────────────────────────────────────
test:
  stage: test
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull
  before_script:
    - npm ci
  script:
    - npm run test -- --watch=false

# ──────────────────────────────────────────────
# BUILD — construit et publie l'image sur le registry
# ──────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  only:
    - main
    - merge_requests
    - tags
    - branches
