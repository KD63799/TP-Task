stages:
  - lint
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ──────────────────────────────────────────────
# LINT — vérifie le formatage Prettier
# ──────────────────────────────────────────────
lint:
  stage: lint
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npx prettier --check "src/**/*.{ts,html,scss,css,json}"

# ──────────────────────────────────────────────
# TEST — exécute les tests unitaires
# ──────────────────────────────────────────────
test:
  stage: test
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull
  before_script:
    - npm ci
  script:
    - npm run test -- --watch=false

# ──────────────────────────────────────────────
# BUILD — construit et publie l'image sur le registry
# ──────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  only:
    - main
    - merge_requests
    - tags
    - branches

# ──────────────────────────────────────────────
# DEPLOY — SSH sur le serveur de prod, pull + restart
# ──────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:3.20
  environment:
    name: production
    url: http://$PROD_HOST
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
  script:
    - |
      ssh -p 63799 -o StrictHostKeyChecking=no "$PROD_USER@$PROD_HOST" "
        set -e
        cd ~/tp-task &&
        echo \"$CI_REGISTRY_PASSWORD\" | docker login -u \"$CI_REGISTRY_USER\" --password-stdin \"$CI_REGISTRY\" &&
        export IMAGE_TAG=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA &&
        docker pull \$IMAGE_TAG &&
        IMAGE_TAG=\$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d &&
        docker image prune -f
      "
    - echo "Déployé → http://$PROD_HOST (tag $CI_COMMIT_SHORT_SHA)"
  only:
    - main
